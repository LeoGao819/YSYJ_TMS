<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>差旅统计</title>
  <style>
    :root {
      --bg: #f2ede4;
      --panel: rgba(255, 252, 247, 0.94);
      --ink: #162033;
      --muted: #627089;
      --line: #dfd4c4;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --shadow: 0 18px 42px rgba(45, 32, 17, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Source Han Sans SC", "Microsoft YaHei UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(180, 83, 9, 0.12), transparent 24%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
    }

    .shell {
      max-width: 1680px;
      margin: 0 auto;
      padding: 22px 18px 34px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(223, 212, 196, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 16px;
      margin-bottom: 16px;
    }

    .hero-main,
    .hero-side,
    .filters,
    .summary-card,
    .table-panel,
    .preview-panel {
      padding: 20px;
    }

    .hero-main h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
      font-family: "Source Han Serif SC", "STSong", serif;
    }

    .hero-side {
      display: grid;
      gap: 10px;
      align-content: center;
    }

    .hero-stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .hero-stat:last-child { border-bottom: none; padding-bottom: 0; }
    .hero-stat span { color: var(--muted); font-size: 13px; }
    .hero-stat strong { font-size: 22px; font-weight: 800; }

    .filters {
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
    }

    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 700; }

    .field input,
    .field select,
    .field button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 11px 12px;
      font-size: 14px;
      color: var(--ink);
      background: #fffdf9;
      outline: none;
    }

    .field button {
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .kpi-card {
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid rgba(223, 212, 196, 0.95);
      box-shadow: var(--shadow);
    }

    .kpi-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .kpi-card strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) 420px;
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .summary-card h2,
    .table-panel h2,
    .preview-panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-family: "Source Han Serif SC", "STSong", serif;
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .mini-table th,
    .mini-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .mini-table th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .mini-table tr:last-child td { border-bottom: none; }

    .preview-panel {
      position: sticky;
      top: 18px;
    }

    .preview-frame {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #fbf7f1;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .preview-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    .preview-empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 18px;
    }

    .meta-list {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--line);
      font-size: 14px;
    }

    .meta-row span { color: var(--muted); }
    .meta-row strong { text-align: right; font-weight: 700; }

    .preview-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(15, 118, 110, 0.12);
      color: var(--accent-strong);
      font-weight: 800;
      text-decoration: none;
    }

    .table-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .table-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid var(--line);
    }

    .data-table {
      width: 100%;
      min-width: 1860px;
      border-collapse: collapse;
      background: #fff;
      font-size: 13px;
    }

    .data-table th,
    .data-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid rgba(223, 212, 196, 0.7);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    .data-table th {
      position: sticky;
      top: 0;
      background: #f7f1e7;
      z-index: 1;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .data-table tr.is-active {
      background: rgba(15, 118, 110, 0.08);
    }

    .preview-btn {
      padding: 7px 12px;
      border-radius: 999px;
      border: none;
      background: rgba(15, 118, 110, 0.14);
      color: var(--accent-strong);
      font-weight: 700;
      cursor: pointer;
    }

    .empty {
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1200px) {
      .hero,
      .dashboard {
        grid-template-columns: 1fr;
      }

      .summary-grid,
      .kpi-grid,
      .filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-panel { position: static; }
    }

    @media (max-width: 760px) {
      .summary-grid,
      .kpi-grid,
      .filters {
        grid-template-columns: 1fr;
      }

      .shell {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-main panel">
        <h1>差旅统计</h1>
      </div>
      <div class="hero-side panel">
        <div class="hero-stat"><span>记录数</span><strong id="heroCount">0</strong></div>
        <div class="hero-stat"><span>时间范围</span><strong id="heroRange">-</strong></div>
        <div class="hero-stat"><span>付款金额</span><strong id="heroPayment">0</strong></div>
        <div class="hero-stat"><span>酒店花费</span><strong id="heroHotel">0</strong></div>
      </div>
    </section>

    <section class="filters panel">
      <div class="field">
        <label for="keyword">关键词</label>
        <input id="keyword" type="text" placeholder="姓名、路线、城市、文件名">
      </div>
      <div class="field">
        <label for="employeeFilter">职员</label>
        <select id="employeeFilter"></select>
      </div>
      <div class="field">
        <label for="gradeFilter">人员职级</label>
        <select id="gradeFilter"></select>
      </div>
      <div class="field">
        <label for="monthFilter">开始月份</label>
        <select id="monthFilter"></select>
      </div>
      <div class="field">
        <label for="transportFilter">交通分类</label>
        <select id="transportFilter"></select>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button id="resetBtn" type="button">重置</button>
      </div>
    </section>

    <section class="kpi-grid" id="kpiGrid"></section>

    <section class="dashboard">
      <div class="summary-grid">
        <article class="summary-card panel">
          <h2>按人员汇总</h2>
          <div id="employeeSummary"></div>
        </article>
        <article class="summary-card panel">
          <h2>按职级汇总</h2>
          <div id="gradeSummary"></div>
        </article>
        <article class="summary-card panel">
          <h2>按月份汇总</h2>
          <div id="monthSummary"></div>
        </article>
        <article class="summary-card panel">
          <h2>交通工具段数统计</h2>
          <div id="transportSummary"></div>
        </article>
        <article class="summary-card panel" style="grid-column: 1 / -1;">
          <h2>热门城市</h2>
          <div id="citySummary"></div>
        </article>
      </div>

      <aside class="preview-panel panel">
        <h2>图片预览</h2>
        <div class="preview-frame">
          <img id="previewImage" alt="差旅截图预览" hidden>
          <div id="previewEmpty" class="preview-empty">选择一条记录查看图片。</div>
        </div>
        <div class="meta-list" id="previewMeta"></div>
        <a id="previewLink" class="preview-link" href="#" target="_blank" rel="noreferrer">打开原图</a>
      </aside>
    </section>

    <section class="table-panel panel">
      <div class="table-head">
        <h2>全部原始数据</h2>
        <p>当前结果 <span id="resultCount">0</span> 条</p>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>预览</th>
              <th>职员</th>
              <th>人员职级</th>
              <th>开始日期</th>
              <th>到达日期</th>
              <th>出差路线</th>
              <th>途径地</th>
              <th>交通分类</th>
              <th>交通工具</th>
              <th>交通费金额（拆项）</th>
              <th>交通费金额（总计）</th>
              <th>伙食补助（拆项）</th>
              <th>伙食补助（总计）</th>
              <th>通讯补助（拆项）</th>
              <th>通讯补助（总计）</th>
              <th>市内交通补助（拆项）</th>
              <th>市内交通补助（总计）</th>
              <th>其他差旅金额（拆项）</th>
              <th>其他差旅金额（总计）</th>
              <th>酒店花费</th>
              <th>付款金额</th>
              <th>file</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

    const employeeFilter = document.getElementById('employeeFilter');
    const gradeFilter = document.getElementById('gradeFilter');
    const monthFilter = document.getElementById('monthFilter');
    const transportFilter = document.getElementById('transportFilter');
    const keywordInput = document.getElementById('keyword');
    const resetBtn = document.getElementById('resetBtn');

    const heroCount = document.getElementById('heroCount');
    const heroRange = document.getElementById('heroRange');
    const heroPayment = document.getElementById('heroPayment');
    const heroHotel = document.getElementById('heroHotel');
    const kpiGrid = document.getElementById('kpiGrid');
    const resultCount = document.getElementById('resultCount');
    const tableBody = document.getElementById('tableBody');

    const employeeSummary = document.getElementById('employeeSummary');
    const gradeSummary = document.getElementById('gradeSummary');
    const monthSummary = document.getElementById('monthSummary');
    const transportSummary = document.getElementById('transportSummary');
    const citySummary = document.getElementById('citySummary');

    const previewImage = document.getElementById('previewImage');
    const previewEmpty = document.getElementById('previewEmpty');
    const previewMeta = document.getElementById('previewMeta');
    const previewLink = document.getElementById('previewLink');

    let selectedKey = allRecords[0] ? allRecords[0].file : '';

    function toNumber(value) {
      return Number.parseFloat(String(value || '0').replace(/,/g, '')) || 0;
    }

    function formatMoney(value) {
      return new Intl.NumberFormat('zh-CN', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      }).format(value || 0);
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function fillSelect(select, values) {
      select.innerHTML = values.map((value) => '<option value="' + escapeHtml(value) + '">' + escapeHtml(value) + '</option>').join('');
    }

    fillSelect(employeeFilter, ['全部'].concat([...new Set(allRecords.map((row) => row['职员']))].sort((a, b) => a.localeCompare(b, 'zh-CN'))));
    fillSelect(gradeFilter, ['全部'].concat([...new Set(allRecords.map((row) => row['人员职级']))].sort((a, b) => a.localeCompare(b, 'zh-CN'))));
    fillSelect(monthFilter, ['全部'].concat([...new Set(allRecords.map((row) => row['开始月份']))].sort()));
    fillSelect(transportFilter, ['全部', '飞机', '高铁', '动车', '普通火车', '汽车', '搭车', '其他']);

    function getFilteredRecords() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const employee = employeeFilter.value;
      const grade = gradeFilter.value;
      const month = monthFilter.value;
      const transport = transportFilter.value;

      return allRecords.filter((record) => {
        if (employee !== '全部' && record['职员'] !== employee) return false;
        if (grade !== '全部' && record['人员职级'] !== grade) return false;
        if (month !== '全部' && record['开始月份'] !== month) return false;
        if (transport !== '全部' && !record['单一交通分类'].includes(transport)) return false;
        if (!keyword) return true;

        const haystack = [
          record['职员'],
          record['人员职级'],
          record['出差路线'],
          record['途径地'],
          record['交通工具'],
          record['file'],
        ].join(' ').toLowerCase();
        return haystack.includes(keyword);
      });
    }

    function aggregateByField(records, field) {
      const map = new Map();
      for (const record of records) {
        const key = record[field] || '未填写';
        if (!map.has(key)) {
          map.set(key, { key, count: 0, payment: 0, hotel: 0 });
        }
        const item = map.get(key);
        item.count += 1;
        item.payment += toNumber(record['付款金额']);
        item.hotel += toNumber(record['酒店花费']);
      }
      return [...map.values()];
    }

    function aggregateTransport(records) {
      const order = ['飞机', '高铁', '动车', '普通火车', '汽车', '搭车', '其他'];
      const map = new Map(order.map((key) => [key, { key, segments: 0, amount: 0 }]));

      for (const record of records) {
        const tools = String(record['交通工具'] || '').split('+').map((item) => item.trim()).filter(Boolean);
        const amounts = String(record['交通费金额（拆项）'] || '').split('+').map((item) => toNumber(item));
        tools.forEach((tool, index) => {
          const category = tool.includes('飞机') ? '飞机'
            : tool.includes('高铁') ? '高铁'
            : tool.includes('动车') ? '动车'
            : tool.includes('普通火车') ? '普通火车'
            : tool.includes('汽车') ? '汽车'
            : tool.includes('搭车') ? '搭车'
            : '其他';
          const current = map.get(category);
          current.segments += 1;
          current.amount += amounts[index] || 0;
        });
      }

      return [...map.values()].filter((item) => item.segments > 0);
    }

    function aggregateCities(records) {
      const map = new Map();
      for (const record of records) {
        (record['热门城市'] || []).forEach((city) => {
          if (!map.has(city)) {
            map.set(city, { key: city, count: 0, payment: 0, hotel: 0 });
          }
          const item = map.get(city);
          item.count += 1;
          item.payment += toNumber(record['付款金额']);
          item.hotel += toNumber(record['酒店花费']);
        });
      }
      return [...map.values()];
    }

    function renderMiniTable(container, rows, firstLabel) {
      if (!rows.length) {
        container.innerHTML = '<div class="empty">没有数据。</div>';
        return;
      }
      container.innerHTML = [
        '<table class="mini-table">',
        '<thead><tr><th>' + firstLabel + '</th><th>记录</th><th>付款金额</th><th>酒店花费</th></tr></thead>',
        '<tbody>',
        ...rows.map((row) =>
          '<tr><td>' + escapeHtml(row.key) + '</td><td>' + row.count + '</td><td>' + formatMoney(row.payment) + '</td><td>' + formatMoney(row.hotel) + '</td></tr>'
        ),
        '</tbody></table>',
      ].join('');
    }

    function renderCountOnlyTable(container, rows, firstLabel) {
      if (!rows.length) {
        container.innerHTML = '<div class="empty">没有数据。</div>';
        return;
      }
      container.innerHTML = [
        '<table class="mini-table">',
        '<thead><tr><th>' + firstLabel + '</th><th>记录</th></tr></thead>',
        '<tbody>',
        ...rows.map((row) =>
          '<tr><td>' + escapeHtml(row.key) + '</td><td>' + row.count + '</td></tr>'
        ),
        '</tbody></table>',
      ].join('');
    }

    function renderTransportTable(container, rows) {
      if (!rows.length) {
        container.innerHTML = '<div class="empty">没有数据。</div>';
        return;
      }
      container.innerHTML = [
        '<table class="mini-table">',
        '<thead><tr><th>分类</th><th>使用段数</th><th>金额</th></tr></thead>',
        '<tbody>',
        ...rows.map((row) =>
          '<tr><td>' + escapeHtml(row.key) + '</td><td>' + row.segments + '</td><td>' + formatMoney(row.amount) + '</td></tr>'
        ),
        '</tbody></table>',
      ].join('');
    }

    function updateHero(records) {
      heroCount.textContent = records.length;
      heroRange.textContent = records.length ? (records[0]['开始日期'] + ' 至 ' + records[records.length - 1]['到达日期']) : '-';
      heroPayment.textContent = formatMoney(records.reduce((sum, row) => sum + toNumber(row['付款金额']), 0));
      heroHotel.textContent = formatMoney(records.reduce((sum, row) => sum + toNumber(row['酒店花费']), 0));
    }

    function updateKpis(records) {
      const payment = records.reduce((sum, row) => sum + toNumber(row['付款金额']), 0);
      const hotel = records.reduce((sum, row) => sum + toNumber(row['酒店花费']), 0);
      const traffic = records.reduce((sum, row) => sum + toNumber(row['交通费金额（总计）']), 0);
      const meal = records.reduce((sum, row) => sum + toNumber(row['伙食补助（总计）']), 0);
      const comm = records.reduce((sum, row) => sum + toNumber(row['通讯补助（总计）']), 0);
      const city = records.reduce((sum, row) => sum + toNumber(row['市内交通补助（总计）']), 0);
      const other = records.reduce((sum, row) => sum + toNumber(row['其他差旅金额（总计）']), 0);

      const items = [
        ['记录数', records.length],
        ['付款金额', formatMoney(payment)],
        ['酒店花费', formatMoney(hotel)],
        ['交通费', formatMoney(traffic)],
        ['补助合计', formatMoney(meal + comm + city)],
        ['其他差旅', formatMoney(other)],
      ];

      kpiGrid.innerHTML = items.map((item) =>
        '<article class="kpi-card"><span>' + item[0] + '</span><strong>' + item[1] + '</strong></article>'
      ).join('');
    }

    function ensureSelected(records) {
      if (!records.length) {
        selectedKey = '';
        return;
      }
      const exists = records.some((record) => record.file === selectedKey);
      if (!exists) {
        selectedKey = records[0].file;
      }
    }

    function renderPreview(record) {
      if (!record) {
        previewImage.hidden = true;
        previewEmpty.hidden = false;
        previewMeta.innerHTML = '';
        previewLink.removeAttribute('href');
        return;
      }

      const imagePath = encodeURI(record['图片路径']);
      previewImage.src = imagePath;
      previewImage.hidden = false;
      previewEmpty.hidden = true;
      previewLink.href = imagePath;
      previewLink.textContent = '打开原图：' + record.file;

      const meta = [
        ['文件', record.file],
        ['职员 / 职级', record['职员'] + ' / ' + record['人员职级']],
        ['时间', record['开始日期'] + ' 至 ' + record['到达日期']],
        ['路线', record['出差路线']],
        ['途径地', record['途径地'] || '无'],
        ['交通分类', record['交通分类']],
        ['酒店花费', formatMoney(toNumber(record['酒店花费']))],
        ['付款金额', formatMoney(toNumber(record['付款金额']))],
      ];

      previewMeta.innerHTML = meta.map((row) =>
        '<div class="meta-row"><span>' + escapeHtml(row[0]) + '</span><strong>' + escapeHtml(row[1]) + '</strong></div>'
      ).join('');
    }

    previewImage.addEventListener('error', () => {
      previewImage.hidden = true;
      previewEmpty.hidden = false;
      previewEmpty.textContent = '图片无法加载，请点击下方链接打开。';
    });

    function renderTable(records) {
      resultCount.textContent = records.length;
      if (!records.length) {
        tableBody.innerHTML = '<tr><td colspan="22" class="empty">没有数据。</td></tr>';
        renderPreview(null);
        return;
      }

      ensureSelected(records);

      tableBody.innerHTML = records.map((record) => {
        const active = record.file === selectedKey ? 'is-active' : '';
        return (
          '<tr class="' + active + '">' +
            '<td><button class="preview-btn" data-key="' + escapeHtml(record.file) + '">预览</button></td>' +
            '<td>' + escapeHtml(record['职员']) + '</td>' +
            '<td>' + escapeHtml(record['人员职级']) + '</td>' +
            '<td>' + escapeHtml(record['开始日期']) + '</td>' +
            '<td>' + escapeHtml(record['到达日期']) + '</td>' +
            '<td>' + escapeHtml(record['出差路线']) + '</td>' +
            '<td>' + escapeHtml(record['途径地']) + '</td>' +
            '<td>' + escapeHtml(record['交通分类']) + '</td>' +
            '<td>' + escapeHtml(record['交通工具']) + '</td>' +
            '<td>' + escapeHtml(record['交通费金额（拆项）']) + '</td>' +
            '<td>' + formatMoney(toNumber(record['交通费金额（总计）'])) + '</td>' +
            '<td>' + escapeHtml(record['伙食补助（拆项）']) + '</td>' +
            '<td>' + formatMoney(toNumber(record['伙食补助（总计）'])) + '</td>' +
            '<td>' + escapeHtml(record['通讯补助（拆项）']) + '</td>' +
            '<td>' + formatMoney(toNumber(record['通讯补助（总计）'])) + '</td>' +
            '<td>' + escapeHtml(record['市内交通补助（拆项）']) + '</td>' +
            '<td>' + formatMoney(toNumber(record['市内交通补助（总计）'])) + '</td>' +
            '<td>' + escapeHtml(record['其他差旅金额（拆项）']) + '</td>' +
            '<td>' + formatMoney(toNumber(record['其他差旅金额（总计）'])) + '</td>' +
            '<td>' + formatMoney(toNumber(record['酒店花费'])) + '</td>' +
            '<td>' + formatMoney(toNumber(record['付款金额'])) + '</td>' +
            '<td>' + escapeHtml(record.file) + '</td>' +
          '</tr>'
        );
      }).join('');

      const selected = records.find((record) => record.file === selectedKey) || records[0];
      renderPreview(selected);

      tableBody.querySelectorAll('.preview-btn').forEach((button) => {
        button.addEventListener('click', () => {
          selectedKey = button.dataset.key;
          renderAll();
        });
      });
    }

    function renderAll() {
      const records = getFilteredRecords();
      updateHero(records);
      updateKpis(records);

      renderMiniTable(
        employeeSummary,
        aggregateByField(records, '职员').sort((a, b) => b.payment - a.payment || b.count - a.count).slice(0, 10),
        '职员'
      );
      renderMiniTable(
        gradeSummary,
        aggregateByField(records, '人员职级').sort((a, b) => b.payment - a.payment || b.count - a.count),
        '职级'
      );
      renderMiniTable(
        monthSummary,
        aggregateByField(records, '开始月份').sort((a, b) => a.key.localeCompare(b.key)),
        '月份'
      );
      renderTransportTable(
        transportSummary,
        aggregateTransport(records).sort((a, b) => b.segments - a.segments || b.amount - a.amount)
      );
      renderCountOnlyTable(
        citySummary,
        aggregateCities(records).sort((a, b) => b.count - a.count || b.payment - a.payment).slice(0, 12),
        '城市'
      );

      renderTable(records);
    }

    [employeeFilter, gradeFilter, monthFilter, transportFilter, keywordInput].forEach((element) => {
      element.addEventListener('input', renderAll);
      element.addEventListener('change', renderAll);
    });

    resetBtn.addEventListener('click', () => {
      employeeFilter.value = '全部';
      gradeFilter.value = '全部';
      monthFilter.value = '全部';
      transportFilter.value = '全部';
      keywordInput.value = '';
      selectedKey = allRecords[0] ? allRecords[0].file : '';
      renderAll();
    });

    renderAll();
  </script>
</body>
</html>
